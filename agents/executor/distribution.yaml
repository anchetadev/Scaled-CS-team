# Executor — Controlled Salesforce Writer Distribution
name: executor
version: 1.0.0
description: "Controlled Salesforce writer. Executes changes only with per-batch human approval. Slow, deliberate, confirmation-seeking."
hermes_requires: ">=0.13.0"
author: "Angel Ancheta"
license: "MIT"

env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key for model access"
    required: true

  - name: SALESFORCE_USERNAME
    description: "Salesforce username"
    required: true

  - name: SALESFORCE_PASSWORD
    description: "Salesforce password"
    required: true

  - name: SALESFORCE_SECURITY_TOKEN
    description: "Salesforce security token"
    required: true
