# Galileo — Supervisor Agent Distribution
name: galileo
version: 1.0.0
description: "Supervisor agent for Scaled Customer Success. Coordinates worker agents, lives in Slack, reports results in plain English."
hermes_requires: ">=0.13.0"
author: "Angel Ancheta"
license: "MIT"

env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key for model access"
    required: true

  - name: SLACK_BOT_TOKEN
    description: "Slack bot token (xoxb-...)"
    required: true

  - name: SLACK_APP_TOKEN
    description: "Slack app token for Socket Mode (xapp-...)"
    required: true
