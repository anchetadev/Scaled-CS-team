# Bell — Communications Specialist Distribution
name: bell
version: 1.0.0
description: "Bell — Communications Specialist for the Scaled CS platform. After a CSM meeting, posts an internal Chatter summary auto, drafts a customer follow-up email, and sends it ONLY after explicit CSM approval (enforced in code by bin/propose_email.py send-approved)."
hermes_requires: ">=0.13.0"
author: "Angel Ancheta"
license: "MIT"

# Bell's bright line is enforced at three layers:
#   - SOUL + skill prompt the agent to draft and propose, never send unilaterally
#   - bin/propose_email.py `send-approved` REFUSES to send when status != "approved"
#   - The send goes through the CSM's own Gmail (separate identity from Bell)
# The Chatter writer (bin/sf_chatter.py) is the only auto-write. Both scripts ship
# in bin/ and require the simple-salesforce + requests Python packages.

env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key for model access"
    required: true

  # ── Salesforce Chatter writer (CS Seeder External Client App, admin role) ──
  - name: SALESFORCE_SEEDER_INSTANCE_URL
    description: "Salesforce My Domain URL for the CS Seeder app (bare host, e.g. https://yourco.develop.my.salesforce.com)"
    required: true

  - name: SALESFORCE_SEEDER_CONSUMER_KEY
    description: "CS Seeder External Client App consumer key (OAuth client id) — admin role; Chatter writes require it"
    required: true

  - name: SALESFORCE_SEEDER_CONSUMER_SECRET
    description: "CS Seeder External Client App consumer secret (OAuth client secret)"
    required: true

  # ── Operator Surface approval queue (Supabase, Hermes-side service-role) ──
  - name: SUPABASE_URL
    description: "Operator Surface Supabase project URL (e.g. https://<project>.supabase.co)"
    required: true

  - name: SUPABASE_SERVICE_ROLE_KEY
    description: "Supabase service-role key (bypasses RLS; Hermes-side only — never expose to clients)"
    required: true

  # ── Optional overrides ──
  - name: OPERATOR_SURFACE_AGENT_SLUG
    description: "Agent registry slug used when filing approvals (default: renewal-outreach)"
    required: false

  - name: OPERATOR_SURFACE_CSM_UID
    description: "UUID used by the demo `approve` subcommand only; production approvals flow through the Operator Surface UI"
    required: false

  - name: BELL_GOOGLE_API_SCRIPT
    description: "Path to the google_api.py helper used to read inboxes and send the approved email. Auto-detected from the productivity/google-workspace skill if not set."
    required: false
