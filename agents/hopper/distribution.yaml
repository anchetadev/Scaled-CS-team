# Hopper — Controlled Executor Distribution
name: hopper
version: 1.1.0
description: "Hopper — Controlled Executor for the Scaled CS platform. Writes approved changes back to Salesforce with per-batch human approval. Deliberate and confirmation-seeking. (Approval-gate design in progress.)"
hermes_requires: ">=0.13.0"
author: "Angel Ancheta"
license: "MIT"

# NOTE: Hopper is the only write-capable agent and is still under design (the
# per-batch human-approval gate is not yet built). Salesforce write credentials
# are declared but optional until the executor is wired and the approval flow
# is verified. Do NOT give Hopper a write-capable Salesforce user until then.
env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key for model access"
    required: true

  - name: SALESFORCE_INSTANCE_URL
    description: "Salesforce instance / My Domain URL"
    required: false

  - name: SALESFORCE_CONSUMER_KEY
    description: "Connected App consumer key (write-capable; pending approval-gate design)"
    required: false

  - name: SALESFORCE_CONSUMER_SECRET
    description: "Connected App consumer secret (write-capable; pending approval-gate design)"
    required: false

  - name: SALESFORCE_USERNAME
    description: "Write-capable Salesforce user (pending approval-gate design)"
    required: false

  - name: SALESFORCE_PASSWORD
    description: "Write-capable Salesforce user password (pending approval-gate design)"
    required: false

  - name: SALESFORCE_SECURITY_TOKEN
    description: "Write-capable Salesforce user security token (pending approval-gate design)"
    required: false
