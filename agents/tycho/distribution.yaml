# Tycho — Salesforce Reader Distribution
name: tycho
version: 1.1.0
description: "Tycho — Salesforce Reader for the Scaled CS platform. Read-only, faithful data pull; pulls account data and flags signals not in Salesforce. No interpretation, no writes."
hermes_requires: ">=0.13.0"
author: "Angel Ancheta"
license: "MIT"

# Auth: a Salesforce Integration User (API-only, read-only permission set) via a
# Connected App OAuth flow. The read-only boundary is enforced at the credential
# layer (Salesforce rejects writes), the connector layer, and the agent layer.
env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key for model access"
    required: true

  - name: SALESFORCE_INSTANCE_URL
    description: "Salesforce instance / My Domain URL (e.g. https://yourco--sandbox.sandbox.my.salesforce.com)"
    required: true

  - name: SALESFORCE_CONSUMER_KEY
    description: "Connected App consumer key (OAuth client id)"
    required: true

  - name: SALESFORCE_CONSUMER_SECRET
    description: "Connected App consumer secret (OAuth client secret)"
    required: true

  - name: SALESFORCE_USERNAME
    description: "Integration User username (API-only, read-only permission set)"
    required: true

  - name: SALESFORCE_PASSWORD
    description: "Integration User password"
    required: true

  - name: SALESFORCE_SECURITY_TOKEN
    description: "Integration User security token"
    required: true
